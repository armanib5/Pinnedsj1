<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinned SJ — What's Happening Downtown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Libre+Franklin:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

:root{
  --wood:#2a1400; --wood2:#3d1e08;
  --cream:#fdf8ed; --ink:#1a0e00;
  --twine:#9a6828; --pin:#d4a860;
  --green:#3d6b42; --blue:#2c5f8a; --gold:#b8860b;
  --red:#c0392b; --purple:#6a4e7a; --brown:#7a5230;
  --crimson:#8B0000;
}

*{box-sizing:border-box;margin:0;padding:0;}

/* ── PARALLAX BODY ── */
body{
  font-family:'Libre Franklin',sans-serif;
  color:var(--ink);
  min-height:100vh;
  background-color:#1a0e00;
  position:relative;
}
/* Replace url('background.jpg') with your own street photo file
   Upload background.jpg to the same folder as index.html on GitHub */
body::before{
  content:'';
  position:fixed; inset:0; z-index:-1;
  background:
    linear-gradient(180deg,rgba(15,8,0,.72) 0%,rgba(25,12,0,.55) 60%,rgba(15,8,0,.7) 100%),
    url('background.jpg') center/cover;
  background-attachment:fixed;
}

/* ── TOPNAV ── */
.topnav{
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 16px; position:sticky; top:0; z-index:50;
  background:rgba(20,10,0,.95); backdrop-filter:blur(10px);
  border-bottom:2px solid #3a1f08;
}
.logo{
  font-family:'Special Elite',monospace; font-size:22px;
  color:#e8c070; letter-spacing:2px; margin-right:8px;
  text-shadow:0 0 20px rgba(232,192,112,.4);
}
.logo span{color:#fff; font-size:13px; font-weight:600; opacity:.7; vertical-align:middle; letter-spacing:0;}
.nav-btn{
  font-family:'Special Elite',monospace; font-size:12px; letter-spacing:1px;
  background:rgba(255,255,255,.07); color:#e8c070;
  border:1px solid rgba(232,192,112,.25); padding:7px 18px;
  cursor:pointer; border-radius:18px; transition:all .2s;
}
.nav-btn.active{background:var(--gold); color:#1a0e00; border-color:var(--gold); font-weight:700;}

/* ── JUMP NAV ── */
.jumpnav{
  display:flex; gap:6px; padding:10px 16px;
  overflow-x:auto; scrollbar-width:none;
  background:rgba(15,8,0,.85); border-bottom:1px solid #3a1f08;
  position:sticky; top:50px; z-index:49;
}
.jumpnav::-webkit-scrollbar{display:none;}
.jbtn{
  font-size:11px; font-weight:700; border:none; border-radius:14px;
  padding:6px 14px; cursor:pointer; color:#fff;
  white-space:nowrap; flex-shrink:0; opacity:.88; transition:transform .15s,opacity .15s;
}
.jbtn:hover{transform:scale(1.06);opacity:1;}
.jbtn.market{background:var(--green);}
.jbtn.foodhall{background:var(--gold);}
.jbtn.artwalk{background:var(--blue);}
.jbtn.cityart{background:var(--purple);}
.jbtn.venue{background:var(--brown);}
.jbtn.holiday{background:var(--crimson);}
.jbtn.shop{background:var(--red);}

/* ── HERO ── */
.hero{
  text-align:center; padding:44px 20px 32px;
  background:radial-gradient(ellipse at 50% 0%,rgba(232,192,112,.12),transparent 65%);
}
.hero h1{
  font-family:'Special Elite',monospace; color:#e8c070;
  font-size:clamp(36px,10vw,68px); letter-spacing:3px;
  text-shadow:0 0 50px rgba(232,192,112,.35),2px 3px 0 rgba(0,0,0,.6);
}
.hero .city{
  font-family:'Playfair Display',serif; font-style:italic;
  color:rgba(232,192,112,.7); font-size:18px; margin-top:4px;
}
.hero .tag{
  display:inline-block; margin-top:14px;
  border:1px solid rgba(232,192,112,.3); border-radius:20px;
  padding:6px 20px; color:rgba(232,192,112,.8); font-size:13px;
}

/* ── BOARD SECTIONS ── */
.bsec{max-width:1060px; margin:0 auto 48px; padding:0 14px;}
.bsec-label{
  display:flex; align-items:center; gap:10px;
  margin-bottom:12px; padding-left:2px;
}
.bsec-label .cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.bsec-label h2{
  font-family:'Special Elite',monospace; color:#e8c070;
  font-size:16px; letter-spacing:1.5px; text-transform:uppercase;
}
.bsec-label .swipe-hint{
  margin-left:auto; font-size:11px; color:rgba(232,192,112,.45);
  display:flex; align-items:center; gap:4px;
}
.cdot.market{background:var(--green);}
.cdot.foodhall{background:var(--gold);}
.cdot.artwalk{background:var(--blue);}
.cdot.cityart{background:var(--purple);}
.cdot.venue{background:var(--brown);}
.cdot.holiday{background:var(--crimson);}
.cdot.shop{background:var(--red);}

/* ── WOOD FRAME ── */
/* Replace url('cork.jpg') with your Canva cork image saved as cork.jpg
   Upload cork.jpg to the same folder as index.html on GitHub */
.wood-outer{
  background:repeating-linear-gradient(180deg,#1a0800 0,#2e1504 4px,#1a0800 7px,#3a1c08 10px);
  border-radius:6px; padding:16px;
  box-shadow:0 0 0 3px #5a3010,0 0 0 6px #1a0800,0 24px 60px rgba(0,0,0,.65);
}
.cork-bg{
  background:url('cork.jpg') center/cover;
  background-color:#b07838;
  border-radius:3px; position:relative;
  overflow:hidden;
  min-height:240px;
}

/* Cork texture fallback (shows when cork.jpg is not yet uploaded) */
.cork-bg::before{
  content:'';
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background-image:
    repeating-linear-gradient(0deg,
      rgba(60,30,5,.3) 0 2px,rgba(200,150,70,.15) 2px 3px,
      transparent 3px 22px),
    repeating-linear-gradient(90deg,
      rgba(60,30,5,.18) 0 1px,transparent 1px 18px);
}
.cork-bg::after{
  content:'';
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background:
    linear-gradient(145deg,rgba(255,220,140,.14) 0%,transparent 45%),
    linear-gradient(-20deg,rgba(0,0,0,.22) 0%,transparent 50%);
}

/* ── TWINE + SCROLL AREA ── */
.board-inner{position:relative; z-index:1; padding:8px 0 24px;}

/* The twine line — stays fixed horizontally while cards scroll */
.twine-line{
  position:absolute; top:36px; left:0; right:0; height:3px; z-index:4;
  background:linear-gradient(90deg,#6a4010,#c8943a 20%,#e0b050 50%,#c8943a 80%,#6a4010);
  box-shadow:0 2px 6px rgba(0,0,0,.45),0 -1px 2px rgba(255,200,80,.2);
}
/* Droop effect for twine */
.twine-line::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,0,0,.25) 0%,transparent 70%);
}

/* ── HORIZONTAL CARD ROW ── */
.cards-row{
  display:flex; gap:18px;
  overflow-x:auto; scroll-snap-type:x mandatory;
  padding:8px 20px 16px;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.cards-row::-webkit-scrollbar{display:none;}

/* ── HANGING CARD WRAPPER ── */
.hang{
  flex-shrink:0; width:calc(33.333% - 14px);
  min-width:170px; max-width:240px;
  display:flex; flex-direction:column; align-items:center;
  scroll-snap-align:start;
}

/* Clothespin SVG */
.cpin{
  width:18px; height:30px; flex-shrink:0; z-index:5; position:relative;
  filter:drop-shadow(1px 2px 3px rgba(0,0,0,.4));
}

/* Thread from clothespin to card */
.thread{
  width:2px; height:14px; flex-shrink:0;
  background:linear-gradient(to bottom,#a07030,#c09050);
  box-shadow:0 0 2px rgba(0,0,0,.2);
}

/* ── FLYER CARD ── */
.fcard{
  width:100%; background:var(--cream);
  box-shadow:0 6px 20px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3),
             inset 0 1px 0 rgba(255,255,255,.8);
  cursor:pointer; overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;
  border-top:2px solid rgba(255,255,255,.75);
  position:relative;
}
.hang:nth-child(3n+1) .fcard{transform:rotate(-1.8deg);}
.hang:nth-child(3n+2) .fcard{transform:rotate(1.2deg);}
.hang:nth-child(3n+3) .fcard{transform:rotate(-0.7deg);}
.fcard:hover{
  transform:scale(1.04) rotate(0deg) translateY(-4px)!important;
  box-shadow:0 14px 36px rgba(0,0,0,.55),0 2px 6px rgba(0,0,0,.3);
  z-index:10;
}
.fcard.expired{opacity:.4; filter:grayscale(70%);}
.fcard-img{
  width:100%; height:110px;
  background:linear-gradient(135deg,#e8d8a8,#d0c088);
  background-size:cover; background-position:center;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:rgba(80,55,15,.35);
  position:relative; overflow:hidden;
}
.fcard-img.has-photo{font-size:0;}
.exp-ribbon{
  position:absolute; top:7px; left:-2px;
  background:#8B0000; color:#fff; font-size:9px; font-weight:700;
  padding:3px 10px; letter-spacing:1px; text-transform:uppercase;
}
.add-photo-btn{
  position:absolute; bottom:5px; right:5px;
  background:rgba(0,0,0,.55); color:#fff; font-size:9px;
  padding:3px 7px; border-radius:8px; cursor:pointer;
}
.fcard-body{padding:11px 12px 13px;}
.cbadge{
  font-family:'Special Elite',monospace; font-size:8.5px;
  text-transform:uppercase; letter-spacing:1.5px;
  padding:2px 7px; color:#fff; display:inline-block; margin-bottom:7px; border-radius:1px;
}
.cbadge.market{background:var(--green);}
.cbadge.foodhall{background:var(--gold);}
.cbadge.artwalk{background:var(--blue);}
.cbadge.cityart{background:var(--purple);}
.cbadge.venue{background:var(--brown);}
.cbadge.holiday{background:var(--crimson);}
.cbadge.shop{background:var(--red);}
.fcard h3{
  font-family:'Special Elite',monospace; font-size:14px;
  line-height:1.25; color:#1a0800; margin-bottom:4px;
}
.fcard .fwhen{font-size:11px; font-weight:700; color:#8B2500; margin-bottom:2px;}
.fcard .fwhere{font-size:10.5px; color:#5a4030; opacity:.85;}

/* ── ADD CARD ── */
.add-fcard{
  width:100%; min-height:170px;
  border:2px dashed rgba(200,160,80,.4);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; cursor:pointer; color:rgba(200,160,80,.6);
  background:rgba(0,0,0,.14); transition:all .2s;
}
.add-fcard:hover{background:rgba(200,160,80,.1); color:rgba(230,190,100,.85);}
.add-plus{font-size:28px; font-family:'Special Elite',monospace; line-height:1;}
.add-label{font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}

/* ── MAP ── */
.map-wrap{max-width:1060px; margin:0 auto 60px; padding:0 14px;}
.map-legend{display:flex; gap:10px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;}
.leg{display:flex; align-items:center; gap:5px; color:#c4a460; font-size:11px; font-weight:600;}
.legdot{width:10px; height:10px; border-radius:50%;}
.legdot.market{background:var(--green);}
.legdot.foodhall{background:var(--gold);}
.legdot.artwalk{background:var(--blue);}
.legdot.cityart{background:var(--purple);}
.legdot.venue{background:var(--brown);}
.legdot.holiday{background:var(--crimson);}
.map-outer{
  background:repeating-linear-gradient(180deg,#1a0800 0,#2e1504 4px,#1a0800 7px,#3a1c08 10px);
  border-radius:6px; padding:14px;
  box-shadow:0 0 0 3px #5a3010,0 0 0 6px #1a0800,0 24px 50px rgba(0,0,0,.6);
}
.map-canvas{
  position:relative; border-radius:2px; height:500px; overflow:hidden;
  background:#ddd0a0;
  background-image:
    repeating-linear-gradient(0deg,rgba(100,75,35,.06) 0 1px,transparent 1px 30px),
    repeating-linear-gradient(90deg,rgba(100,75,35,.06) 0 1px,transparent 1px 30px);
  box-shadow:inset 0 0 80px rgba(80,55,20,.3);
}
.mtitle{
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  font-family:'Playfair Display',serif; font-style:italic; font-size:21px;
  color:#4a3418; pointer-events:none; white-space:nowrap;
  text-shadow:1px 1px 0 rgba(255,255,255,.4);
}
.mcompass{
  position:absolute; bottom:14px; right:14px; width:42px; height:42px;
  border:2px solid #8a6830; border-radius:50%; background:rgba(240,220,150,.8);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-weight:700; color:#4a3418; font-size:13px;
  pointer-events:none;
}
.mstreet{position:absolute; background:#c8b880; box-shadow:0 0 0 1px rgba(90,65,30,.25);}
.mslabel{
  position:absolute; font-size:9px; font-weight:700; color:#5a4020;
  font-family:'Playfair Display',serif; pointer-events:none;
  text-transform:uppercase; letter-spacing:.5px;
}
.mpark{
  position:absolute; border-radius:50%;
  background:radial-gradient(circle,#b8d4a0,#8aaa70);
  border:2px solid #5a8048; pointer-events:none;
}
.mpark-lbl{
  position:absolute; text-align:center; pointer-events:none;
  font-family:'Playfair Display',serif; font-style:italic;
  font-weight:700; color:#2e4023; font-size:10px; line-height:1.25;
}
.mpin{
  position:absolute; width:26px; height:26px;
  border-radius:50% 50% 50% 0; transform:rotate(-45deg) translate(-50%,-100%);
  box-shadow:0 3px 8px rgba(0,0,0,.4); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,.7); transition:transform .15s; z-index:4;
}
.mpin:hover{transform:rotate(-45deg) translate(-50%,-100%) scale(1.2); z-index:6;}
.mpin span{transform:rotate(45deg); font-size:11px;}
.mpin.market{background:var(--green);}
.mpin.foodhall{background:var(--gold);}
.mpin.artwalk{background:var(--blue);}
.mpin.cityart{background:var(--purple);}
.mpin.venue{background:var(--brown);}
.mpin.holiday{background:var(--crimson);}
.mlbl{
  position:absolute; font-size:10px; font-weight:700;
  background:rgba(253,246,220,.92); color:#2a1800;
  padding:2px 6px; border-radius:2px; white-space:nowrap;
  transform:translate(-50%,5px); pointer-events:none;
  border:1px solid rgba(90,65,30,.35); z-index:3;
  font-family:'Playfair Display',serif;
}

/* ── OVERLAY ── */
.overlay{
  position:fixed; inset:0; background:rgba(8,4,0,.85);
  display:none; align-items:center; justify-content:center;
  padding:18px; z-index:100; backdrop-filter:blur(6px);
}
.overlay.open{display:flex;}
.det,.frmcard{
  background:linear-gradient(155deg,#fdf8ed,#f0e4c0);
  max-width:460px; width:100%; max-height:92vh; overflow-y:auto;
  box-shadow:0 30px 70px rgba(0,0,0,.65); border-radius:3px; position:relative;
  border-top:4px solid var(--gold);
}
.det-img{
  width:100%; height:195px; background-size:cover; background-position:center;
  cursor:zoom-in; background-color:#e0d0a0;
  display:flex; align-items:center; justify-content:center; font-size:44px; color:rgba(80,55,15,.25);
}
.det-img.hasp{font-size:0;}
.xbtn{
  position:absolute; top:12px; right:12px; width:36px; height:36px;
  border-radius:50%; background:#c0392b; color:#fff;
  border:3px solid #fff; font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.4); z-index:5;
}
.det-body{padding:20px 22px 30px;}
.det-body h2{font-family:'Special Elite',monospace; font-size:21px; margin-bottom:8px; color:#1a0800;}
.det-when{font-weight:700; font-size:14px; color:#8B2500; margin-bottom:4px;}
.det-loc{
  display:flex; align-items:flex-start; gap:10px;
  margin:6px 0 14px; flex-wrap:wrap;
}
.det-addr{font-size:13px; color:#5a4030; flex:1;}
.maps-btn{
  background:var(--blue); color:#fff; font-family:'Special Elite',monospace;
  font-size:11px; padding:7px 13px; border:none; border-radius:3px;
  cursor:pointer; text-decoration:none; display:inline-block; white-space:nowrap;
  flex-shrink:0;
}
.det-desc{font-size:14px; line-height:1.6; color:#2a1800; margin-bottom:14px;}
.det-warn{
  font-size:12.5px; background:#fef3cd; border-left:4px solid var(--gold);
  padding:8px 12px; margin-bottom:12px; border-radius:0 3px 3px 0; color:#5a4000;
  font-style:italic;
}
.det-exp{
  font-size:12.5px; background:#fff0f0; border-left:4px solid var(--crimson);
  padding:8px 12px; margin-bottom:12px; border-radius:0 3px 3px 0; color:#5a0000;
}
.tags{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
.tag{
  font-size:11px; border:1px solid rgba(90,65,30,.3); border-radius:13px;
  padding:3px 10px; color:#5a4030; background:rgba(0,0,0,.04);
}
.uplbl{
  display:inline-block; margin-bottom:14px; background:var(--green); color:#fff;
  font-family:'Special Elite',monospace; font-size:11px; padding:7px 13px;
  border:none; border-radius:3px; cursor:pointer;
}
.vg-section{margin-top:14px; border-top:1px dashed #c4a060; padding-top:12px;}
.vg-filters{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
.vchip{
  font-size:11px; font-weight:600; background:#e8d890; border:none;
  border-radius:12px; padding:5px 10px; cursor:pointer; color:#3a2810;
}
.vchip.on{background:var(--gold); color:#fff;}
.vg-section h3{
  font-family:'Special Elite',monospace; font-size:12px; text-transform:uppercase;
  letter-spacing:1.5px; margin:12px 0 6px; color:var(--green);
}
.vi{font-size:13px; line-height:1.55; margin-bottom:3px; color:#2a1800;}
.vi.hidden{display:none;}
.vgrp.hidden h3{display:none;}
.vnote{font-size:11px; color:#8a7050; font-style:italic;}
.sug-btn{
  margin-top:12px; width:100%; background:#f5edd0;
  border:1px dashed var(--gold); color:#5a4000;
  font-size:12px; padding:9px; border-radius:3px; cursor:pointer; text-align:left;
}

/* ── FORM ── */
.frmcard{padding:0;}
.frmbody{padding:24px 24px 28px;}
.frmbody h2{font-family:'Special Elite',monospace; font-size:20px; margin-bottom:16px; color:#1a0800;}
.frmbody label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin:12px 0 4px; color:#5a4030;}
.frmbody input,.frmbody textarea,.frmbody select{
  width:100%; padding:9px 11px; border:1.5px solid #c4a060;
  background:#fffef8; font-family:'Libre Franklin',sans-serif; font-size:14px; color:#1a0800; border-radius:2px;
}
.frmbody textarea{resize:vertical; min-height:60px;}
.form-acts{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
.btn-ok{
  font-family:'Special Elite',monospace; background:var(--green); color:#fff;
  border:none; padding:10px 18px; cursor:pointer; font-size:13px; border-radius:3px;
}
.btn-no{
  font-family:'Special Elite',monospace; background:transparent; color:#5a4030;
  border:1.5px solid #c4a060; padding:10px 16px; cursor:pointer; font-size:13px; border-radius:3px;
}

/* ── ZOOM ── */
.zoom-ov{
  position:fixed; inset:0; background:rgba(0,0,0,.94); display:none;
  align-items:center; justify-content:center; z-index:200; cursor:zoom-out; padding:20px;
}
.zoom-ov.open{display:flex;}
.zoom-ov img{max-width:100%; max-height:100%; border-radius:3px;}

footer{
  text-align:center; color:rgba(200,160,80,.45); font-size:12px;
  padding:20px 16px 40px; border-top:1px solid rgba(255,255,255,.04);
}

@media(max-width:500px){
  .hang{width:80vw; min-width:0; max-width:none;}
  .hang:nth-child(n) .fcard{transform:rotate(0)!important;}
}
</style>
</head>
<body>

<div class="topnav">
  <span class="logo">📌 Pinned <span>SJ</span></span>
  <button class="nav-btn active" id="navBoard">Boards</button>
  <button class="nav-btn" id="navMap">Map</button>
</div>
<div class="jumpnav" id="jumpnav"></div>

<div class="hero">
  <h1>Pinned SJ</h1>
  <div class="city">What's happening in Downtown San José</div>
  <div class="tag">Markets · Food · Art · World Cup · Events</div>
</div>

<div id="boardView"></div>

<div class="map-wrap" id="mapView" style="display:none;">
  <div class="map-legend" id="mapLeg"></div>
  <div class="map-outer">
    <div class="map-canvas" id="mapCanvas">
      <div class="mtitle">Downtown San José</div>
      <div class="mstreet" style="left:0;right:0;top:36%;height:11px;"></div>
      <div class="mstreet" style="left:0;right:0;top:50%;height:10px;"></div>
      <div class="mstreet" style="left:0;right:0;top:64%;height:10px;"></div>
      <div class="mstreet" style="left:36%;top:0;bottom:0;width:10px;"></div>

<div class="zoom-ov" id="zoomOv"><img id="zoomImg" src="" alt=""></div>

<script>
const CATS={
  market: {label:'Markets',icon:'🌽'},
  foodhall:{label:'Food Hall',icon:'🍽️'},
  artwalk: {label:'Art Walk & Events',icon:'🎨'},
  cityart: {label:'City Art',icon:'🎭'},
  venue:   {label:'Museums & Galleries',icon:'🏛️'},
  holiday: {label:'Holiday & World Cup',icon:'⚽'},
  shop:    {label:'Local Shops',icon:'🛍️'}
};
const CORD=['market','foodhall','artwalk','cityart','venue','holiday','shop'];

const DEF=[
  {
    id:'farmersmarket',cat:'market',catLabel:'Weekly Market',expired:false,
    title:"Downtown SJ Farmers' Market",
    when:'Wednesdays · 9:00am – 1:30pm',
    where:'101 Paseo de San Antonio, San Jose, CA 95113',
    desc:'Seasonal fruits, vegetables, and artisanal goods. 90 minutes of free parking at ParkSJ garage, entrances on 2nd and 3rd Street.',
    tags:['Produce','Weekly','Parking Free'],photo:'',mapX:'62%',mapY:'42%',missing:'',endDate:'',
    vg:[
      {g:'Farmers',items:['Xiong Farms — Asian veggies','Lopez Family Farm — conventional fruits','Bay Fresh — strawberries','Green Mix Ranch — organic veggies']},
      {g:'Packaged Food',items:['California Bakeshop — cookies, empanadas','Brothers Products S.F. — hummus, yogurt','Hurno — specialty pastries','Mango Blossom Apiary — honey','Baby Tiger Bakery — conchas','Valley Toffee LLC — multi-variety toffee']},
      {g:'Hot Food',items:['Dumpling King — dumplings',"Chiken's Tamales — tamales, vegan empanadas",'Thai Street Food — satay, papaya salad, thai tea',"Jaden's Kettle Corn",'Cuisina Express — Filipino food']},
      {g:'Arts & Crafts',items:['Sea Moss Healing — soaps','Plant Code — essential oils (2nd & 4th Wed only)','Starme — handmade clothes (out for season)']}
    ]
  },
  {
    id:'sofamarket',cat:'foodhall',catLabel:'Food Hall · Daily',expired:false,
    title:'SoFA Market',
    when:'Open Daily · 11am – 9pm (varies by vendor)',
    where:'387 S 1st St, San Jose, CA 95113',
    desc:'A permanent downtown food hall with multiple restaurants and a bar. sofamarketsj.com · (408) 642-5270',
    tags:['Food Hall','Daily','Permanent'],photo:'',mapX:'50%',mapY:'68%',missing:'',endDate:'',
    vg:[
      {g:'Restaurants',items:['Vietnoms — pho, banh mi, Vietnamese & fusion · Ste 121 · 11:30am–7pm','3 Hermanos Mexican — tacos, burritos, cocktail bar · #105 · 9am–9pm','Pizzeria Rosa Maria — pizza · #104 · 11am–3pm & 4:30–8:30pm','Umi Hand Roll Bar — sushi hand rolls · 10:30am–9pm','Habana Cuba — Cuban food · closed Mondays','Iscu Tea — temporarily closed']},
      {g:'Bar',items:['Fountainhead Bar — cocktails at the back of SoFA · Noon–9pm · bring food from any vendor']}
    ]
  },
  {
    id:'soccer',cat:'holiday',catLabel:'World Cup · Free',expired:false,
    title:'Soccer Celebration — World Cup Watch Party',
    when:'June 11 – July 19 · All 104 matches free',
    where:'San Pedro Square Market, 87 N San Pedro St, San Jose, CA',
    desc:'The Bay Area\'s largest free World Cup watch party. All 104 matches broadcast live on multiple jumbo screens including a 500 sq ft flagship screen. Free with RSVP. Today: USA vs Bosnia & Herzegovina Round of 32 at 5pm PT — officially the largest watch party in the region.',
    tags:['Free','World Cup','All Matches','RSVP Required'],photo:'',mapX:'38%',mapY:'30%',
    missing:'',endDate:'2026-07-19',
    vg:[]
  },
  {
    id:'artwalk',cat:'artwalk',catLabel:'Monthly Art Walk',expired:false,
    title:'South First Fridays ArtWalk',
    when:'First Friday Monthly (dark Jan & July) · 5pm – 9pm',
    where:'South 1st Street, SoFA District, San Jose',
    desc:'A free, self-guided evening tour through downtown galleries, museums, live music, and street vendors. 100% free and family-friendly.',
    tags:['Art','Music','Free','Monthly'],photo:'',mapX:'50%',mapY:'80%',
    missing:'Still confirming: gallery list, vendor lineup, beer garden, and vintage clothes market.',endDate:'',
    vg:[]
  },
  {
    id:'gaiascope',cat:'cityart',catLabel:'City Art · On View',expired:false,
    title:'Gaiascope at Circle of Palms',
    when:'May 22 – Aug 18, 2026 · Always open',
    where:'Circle of Palms Plaza, 127 S Market St, San Jose, CA',
    desc:'Artist Brooke Einbender presents three suspended kaleidoscope sculptures held by steel cables — a free public art experience next to Plaza de César Chávez.',
    tags:['Public Art','Free','City of San Jose'],photo:'',mapX:'34%',mapY:'34%',missing:'',endDate:'2026-08-18',
    vg:[]
  },
  {
    id:'july4',cat:'holiday',catLabel:'4th of July',expired:false,
    title:'4th of July Downtown Events',
    when:'Friday July 4, 2026 · Various times',
    where:'Downtown San Jose, CA',
    desc:'Independence Day celebrations across downtown San Jose including fireworks, food vendors, live music, and family activities.',
    tags:['Holiday','Fireworks','Annual'],photo:'',mapX:'44%',mapY:'52%',
    missing:'Full vendor/event schedule not yet confirmed — check sanjoseca.gov.',endDate:'2026-07-04',
    vg:[]
  }
];

const KEY='pinnedsj-v1';
let data=[];

const boardView=document.getElementById('boardView');
const ov=document.getElementById('overlay');
const ovIn=document.getElementById('overlayIn');
const zoomOv=document.getElementById('zoomOv');
const zoomImg=document.getElementById('zoomImg');

function load(){
  try{const r=localStorage.getItem(KEY);data=r?JSON.parse(r):JSON.parse(JSON.stringify(DEF));}
  catch(e){data=JSON.parse(JSON.stringify(DEF));}
  checkExpiry();render();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}

function checkExpiry(){
  const t=new Date().toISOString().slice(0,10);
  data.forEach(d=>{if(d.endDate&&d.endDate<t)d.expired=true;});
}

function render(){renderJump();renderBoards();renderMap();}

function renderJump(){
  const jn=document.getElementById('jumpnav');
  jn.innerHTML='';
  CORD.forEach(cat=>{
    if(!data.some(d=>d.cat===cat)&&cat!=='venue'&&cat!=='shop')return;
    const b=document.createElement('button');
    b.className='jbtn '+cat;
    b.textContent=CATS[cat].label;
    b.onclick=()=>{
      boardView.style.display='block';
      document.getElementById('mapView').style.display='none';
      document.getElementById('navBoard').classList.add('active');
      document.getElementById('navMap').classList.remove('active');
      const t=document.getElementById('sec-'+cat);
      if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
    };
    jn.appendChild(b);
  });
}

function cpinSVG(){
  return `<svg class="cpin" width="18" height="30" viewBox="0 0 18 30">
    <rect x="3" y="0" width="12" height="20" rx="2" fill="#d4a860"/>
    <rect x="3" y="9" width="12" height="2" fill="rgba(0,0,0,.2)"/>
    <rect x="3" y="0" width="12" height="3" rx="1" fill="#e8c078"/>
    <rect x="5" y="20" width="3" height="10" rx="1.5" fill="#c49048"/>
    <rect x="10" y="20" width="3" height="10" rx="1.5" fill="#c49048"/>
    <rect x="7.5" y="18" width="3" height="12" rx="1" fill="#a07830"/>
  </svg>`;
}

function renderBoards(){
  boardView.innerHTML='';
  CORD.forEach(cat=>{
    const items=data.filter(d=>d.cat===cat);
    if(!items.length&&cat!=='venue'&&cat!=='shop')return;

    const sec=document.createElement('div');
    sec.className='bsec'; sec.id='sec-'+cat;
    const active=items.filter(i=>!i.expired).length;
    const past=items.filter(i=>i.expired).length;
    sec.innerHTML=`
      <div class="bsec-label">
        <span class="cdot ${cat}"></span>
        <h2>${CATS[cat].label}</h2>
        <span class="swipe-hint">${active} active${past?' · '+past+' past':''} &nbsp;← swipe →</span>
      </div>
      <div class="wood-outer">
        <div class="cork-bg">
          <div class="board-inner">
            <div class="twine-line"></div>
            <div class="cards-row" id="row-${cat}"></div>
          </div>
        </div>
      </div>`;
    boardView.appendChild(sec);

    const row=sec.querySelector('#row-'+cat);
    items.forEach(item=>{
      const h=document.createElement('div');
      h.className='hang';
      const imgHtml=item.photo
        ?`<div class="fcard-img has-photo" style="background-image:url('${item.photo}')">
            ${item.expired?'<div class="exp-ribbon">Past</div>':''}
            <label class="add-photo-btn" onclick="event.stopPropagation()">📷
              <input type="file" accept="image/*" style="display:none" onchange="doUpload(event,'${item.id}')">
            </label>
          </div>`
        :`<div class="fcard-img">${CATS[item.cat].icon}
            ${item.expired?'<div class="exp-ribbon">Past</div>':''}
            <label class="add-photo-btn" onclick="event.stopPropagation()">📷 add photo
              <input type="file" accept="image/*" style="display:none" onchange="doUpload(event,'${item.id}')">
            </label>
          </div>`;
      h.innerHTML=`
        ${cpinSVG()}
        <div class="thread"></div>
        <div class="fcard${item.expired?' expired':''}">
          ${imgHtml}
          <div class="fcard-body">
            <span class="cbadge ${item.cat}">${item.catLabel}</span>
            <h3>${item.title}</h3>
            <div class="fwhen">${item.when}</div>
            <div class="fwhere">📍 ${item.where}</div>
          </div>
        </div>`;
      h.querySelector('.fcard').addEventListener('click',()=>openDetail(item.id));
      row.appendChild(h);
    });

    const ah=document.createElement('div');
    ah.className='hang';
    ah.innerHTML=`
      ${cpinSVG()}
      <div class="thread"></div>
      <div class="add-fcard">
        <div class="add-plus">+</div>
        <div class="add-label">Post a flyer</div>
      </div>`;
    ah.querySelector('.add-fcard').addEventListener('click',()=>openPostForm(cat));
    row.appendChild(ah);
  });
}

function renderMap(){
  const canvas=document.getElementById('mapCanvas');
  canvas.querySelectorAll('.mpin,.mlbl').forEach(e=>e.remove());
  data.forEach(item=>{
    const pin=document.createElement('div');
    pin.className='mpin '+item.cat;
    pin.style.left=item.mapX; pin.style.top=item.mapY;
    pin.innerHTML=`<span>${CATS[item.cat].icon}</span>`;
    pin.title=item.title;
    pin.onclick=()=>openDetail(item.id);
    canvas.appendChild(pin);
    const lbl=document.createElement('div');
    lbl.className='mlbl';
    lbl.style.left=item.mapX; lbl.style.top=item.mapY;
    lbl.textContent=item.title.split(' ').slice(0,3).join(' ');
    canvas.appendChild(lbl);
  });
  const leg=document.getElementById('mapLeg');
  leg.innerHTML='';
  CORD.forEach(cat=>{
    if(!data.some(d=>d.cat===cat))return;
    leg.innerHTML+=`<div class="leg"><span class="legdot ${cat}"></span>${CATS[cat].label}</div>`;
  });
}

function openDetail(id){
  const item=data.find(d=>d.id===id);
  const murl='https://www.google.com/maps/search/'+encodeURIComponent(item.where);
  let vhtml='';
  if(item.vg&&item.vg.length){
    const gs=item.vg.map(g=>g.g);
    vhtml=`<div class="vg-section">
      <div class="vg-filters">
        <button class="vchip on" onclick="filterV(this,'all')">All</button>
        ${gs.map(g=>`<button class="vchip" onclick="filterV(this,'${g}')">${g}</button>`).join('')}
      </div>
      ${item.vg.map(g=>`
        <div class="vgrp" data-g="${g.g}">
          <h3>${g.g}</h3>
          ${g.items.map(v=>`<div class="vi" data-g="${g.g}">${v}</div>`).join('')}
        </div>`).join('')}
      <button class="sug-btn" onclick="openSuggest('${item.id}')">+ Suggest a vendor we're missing</button>
    </div>`;
  } else {
    vhtml=`<div class="vg-section"><button class="sug-btn" onclick="openSuggest('${item.id}')">+ Suggest a vendor or detail we're missing</button></div>`;
  }
  const imgHtml=item.photo
    ?`<div class="det-img hasp" style="background-image:url('${item.photo}')" onclick="doZoom('${item.photo}')"></div>`
    :`<div class="det-img">${CATS[item.cat].icon}</div>`;
  const warnHtml=item.missing?`<div class="det-warn">⚠️ ${item.missing}</div>`:'';
  const expHtml=item.expired?`<div class="det-exp">🔴 This event has ended.</div>`:'';
  ovIn.innerHTML=`
    <div class="det">
      <button class="xbtn" onclick="closeOv()">✕</button>
      ${imgHtml}
      <div class="det-body">
        <span class="cbadge ${item.cat}">${item.catLabel}</span>
        <h2>${item.title}</h2>
        <div class="det-when">${item.when}</div>
        <div class="det-loc">
          <span class="det-addr">📍 ${item.where}</span>
          <a class="maps-btn" href="${murl}" target="_blank">Open in Maps</a>
        </div>
        ${expHtml}${warnHtml}
        <p class="det-desc">${item.desc}</p>
        <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <label class="uplbl">📷 Add / update photo
          <input type="file" accept="image/*" style="display:none" onchange="doUpload(event,'${item.id}',true)">
        </label>
        ${vhtml}
      </div>
    </div>`;
  ov.classList.add('open');
}

function filterV(btn,group){
  const vg=btn.closest('.vg-section');
  vg.querySelectorAll('.vchip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  vg.querySelectorAll('.vgrp').forEach(el=>{
    if(group==='all'||el.dataset.g===group)el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
}

function closeOv(){ov.classList.remove('open');ovIn.innerHTML='';}
function doZoom(src){if(!src)return;zoomImg.src=src;zoomOv.classList.add('open');}
zoomOv.onclick=()=>zoomOv.classList.remove('open');

function doUpload(e,id,reopen){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const item=data.find(d=>d.id===id);
    item.photo=ev.target.result;
    save();renderBoards();renderMap();
    if(reopen){closeOv();openDetail(id);}
  };
  reader.readAsDataURL(file);
}

function openPostForm(defCat){
  ovIn.innerHTML=`
    <div class="frmcard">
      <button class="xbtn" onclick="closeOv()" style="top:12px;right:12px;">✕</button>
      <div class="frmbody">
        <h2>Post a Flyer</h2>
        <label>Title</label>
        <input id="pt" type="text" placeholder="e.g. Japantown Night Market">
        <label>Category</label>
        <select id="pc">
          <option value="market">Market</option>
          <option value="foodhall">Food Hall</option>
          <option value="artwalk">Art Walk / Event</option>
          <option value="cityart">City / Public Art</option>
          <option value="venue">Museum / Gallery</option>
          <option value="holiday">Holiday / World Cup</option>
          <option value="shop">Local Shop</option>
        </select>
        <label>When</label>
        <input id="pw" type="text" placeholder="e.g. Saturday July 5, noon–6pm">
        <label>Where (address)</label>
        <input id="pa" type="text" placeholder="e.g. 87 N San Pedro St, San Jose, CA">
        <label>Description</label>
        <textarea id="pd" placeholder="A few sentences about this event..."></textarea>
        <label>Photo (optional)</label>
        <input id="pp" type="file" accept="image/*">
        <label>End date (for auto-expiry)</label>
        <input id="pe" type="date">
        <div class="form-acts">
          <button class="btn-no" onclick="closeOv()">Cancel</button>
          <button class="btn-ok" onclick="submitFlyer()">Pin it up ✓</button>
        </div>
      </div>
    </div>`;
  document.getElementById('pc').value=defCat||'artwalk';
  ov.classList.add('open');
}

function submitFlyer(){
  const t=document.getElementById('pt').value.trim();
  const a=document.getElementById('pa').value.trim();
  if(!t||!a){alert('Please add a title and address.');return;}
  const cat=document.getElementById('pc').value;
  const newItem={
    id:'u'+Date.now(),cat,catLabel:CATS[cat].label,expired:false,
    title:t,when:document.getElementById('pw').value.trim()||'Hours TBD',
    where:a,desc:document.getElementById('pd').value.trim()||'',
    tags:['Community Posted'],photo:'',
    mapX:(28+Math.random()*44)+'%',mapY:(28+Math.random()*44)+'%',
    missing:'',endDate:document.getElementById('pe').value||'',vg:[]
  };
  function finish(){
    data.push(newItem);checkExpiry();
    closeOv();render();save();
  }
  const pf=document.getElementById('pp').files[0];
  if(pf){const r=new FileReader();r.onload=ev=>{newItem.photo=ev.target.result;finish();};r.readAsDataURL(pf);}
  else finish();
}

function openSuggest(lid){
  ovIn.innerHTML=`
    <div class="frmcard">
      <button class="xbtn" onclick="openDetail('${lid}')" style="top:12px;right:12px;">←</button>
      <div class="frmbody">
        <h2>Suggest a Vendor</h2>
        <label>Group (e.g. Hot Food, Bar, Crafts)</label>
        <input id="sg" type="text" placeholder="e.g. Hot Food">
        <label>Vendor name & what they sell</label>
        <input id="sn" type="text" placeholder="e.g. Rosario's — carnitas, horchata">
        <div class="form-acts">
          <button class="btn-no" onclick="openDetail('${lid}')">Back</button>
          <button class="btn-ok" onclick="submitSuggest('${lid}')">Submit</button>
        </div>
      </div>
    </div>`;
}

function submitSuggest(lid){
  const g=document.getElementById('sg').value.trim()||'Suggested';
  const n=document.getElementById('sn').value.trim();
  if(!n){alert('Please add a vendor name.');return;}
  const item=data.find(d=>d.id===lid);
  let vg=item.vg.find(x=>x.g.toLowerCase()===g.toLowerCase());
  if(!vg){vg={g,items:[]};item.vg.push(vg);}
  vg.items.push(n+' <span class="vnote">(suggested — pending confirmation)</span>');
  save();closeOv();openDetail(lid);
}

document.getElementById('navBoard').onclick=()=>{
  boardView.style.display='block';
  document.getElementById('mapView').style.display='none';
  document.getElementById('navBoard').classList.add('active');
  document.getElementById('navMap').classList.remove('active');
};
document.getElementById('navMap').onclick=()=>{
  boardView.style.display='none';
  document.getElementById('mapView').style.display='block';
  document.getElementById('navMap').classList.add('active');
  document.getElementById('navBoard').classList.remove('active');
};
